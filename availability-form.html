<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiment Availability Form</title>
  <link rel="stylesheet" href="availability-form.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Experiment Availability Form</h1>
      <p class="subtitle">Please fill in your details and add one or more available time slots.</p>

      <form id="availabilityForm" novalidate>
        <label for="participantName">Name</label>
        <input id="participantName" name="participantName" type="text" required maxlength="50" />

        <label for="participantEmail">Email</label>
        <input id="participantEmail" name="participantEmail" type="email" required maxlength="120" />

        <label for="participantNote">Note (Optional)</label>
        <textarea id="participantNote" name="participantNote" rows="3" maxlength="300"></textarea>

        <div class="slot-builder">
          <h2>Available Time Slots</h2>
          <p class="slot-help">
            Drag to paint your availability in 30-minute blocks. Use week navigation to cover all weeks in April.
          </p>
          <div class="week-controls">
            <button type="button" id="prevWeekBtn">Previous Week</button>
            <select id="weekSelect" aria-label="Select April week"></select>
            <button type="button" id="nextWeekBtn">Next Week</button>
          </div>

          <div id="weekLabel" class="week-label"></div>

          <div class="week-grid-wrapper">
            <div id="weekGrid" class="week-grid" role="grid" aria-label="Weekly availability grid"></div>
          </div>

          <p id="selectionSummary" class="selection-summary"></p>
          <ul id="slotList" class="slot-list"></ul>
        </div>

        <button class="submit-btn" type="submit">Submit and Send Email</button>
        <p id="statusMsg" class="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="availability-form.js"></script>
</body>
</html>
