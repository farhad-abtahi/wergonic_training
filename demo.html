<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="gamification.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --surface: var(--md-sys-color-surface-container-low);
            --card:    var(--md-sys-color-surface);
            --border:  var(--md-sys-color-outline-variant);
            --text:    var(--md-sys-color-on-surface);
            --muted:   var(--md-sys-color-on-surface-variant);
            --accent:  var(--md-sys-color-primary);
        }

        body {
            background: var(--md-sys-color-surface);
            color: var(--text);
            min-height: 100vh;
        }

        .demo-header-shell {
            max-width: 1300px;
            margin: 0 auto;
            padding: 24px 24px 0;
        }

        .slot-picker {
            max-width: 1300px;
            margin: 0 auto;
            padding: 12px 24px 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .record-slot-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
        }
        .record-slot-title {
            font-size: 0.82rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .record-slot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .slot-picker .slot-field {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
        }
        .slot-picker label {
            display: block;
            font-size: 0.74rem;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }
        .slot-picker select {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            background: var(--surface);
            color: var(--text);
        }
        .slot-picker .apply-btn { width: 100%; }
        @media (max-width: 900px) {
            .slot-picker {
                grid-template-columns: 1fr;
            }
            .record-slot-grid {
                grid-template-columns: 1fr;
            }
            .slot-picker .apply-btn {
                width: 100%;
            }
        }

        .record-parts {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .record-part {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            background: var(--surface);
        }
        .record-part h3 {
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .record-overview-strip {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .record-overview-strip .stat-cell {
            padding: 10px 6px;
            margin-bottom: 0;
        }
        @media (max-width: 900px) {
            .record-parts {
                grid-template-columns: 1fr;
            }
        }

        /* ── Layout ──────────────────────────────────────── */
        .demo-container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 0 24px 48px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(640px, 1fr));
            gap: 24px;
        }
        @media (max-width: 900px) { .demo-container { grid-template-columns: 1fr; } }

        /* ── Session Card ─────────────────────────────────── */
        .session-card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
            overflow: hidden;
        }
        .session-card-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .session-card-header h2 { font-size: 1.15rem; font-weight: 700; }
        .file-badge {
            font-size: 0.75rem;
            font-family: monospace;
            background: #f0f4ff;
            color: #4f46e5;
            border-radius: 6px;
            padding: 3px 10px;
        }
        .session-card-body { padding: 20px 24px 24px; }

        /* ── Stats Grid ───────────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-cell {
            background: var(--surface);
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
        }
        .stat-cell .stat-val   { font-size: 1.3rem; font-weight: 700; line-height: 1; }
        .stat-cell .stat-label { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }
        .c-green  { color: #2e7d32; }
        .c-yellow { color: #e65100; }
        .c-red    { color: #b71c1c; }
        .c-muted  { color: var(--muted); font-size: 0.85rem !important; }

        /* ── RULA badge ───────────────────────────────────── */
        .rula-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .rula-badge .rula-icon { font-size: 1.5rem; }

        /* ── Section labels ───────────────────────────────── */
        .section-title {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin: 22px 0 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
        }

        /* ── Replay Button ────────────────────────────────── */
        .replay-full-btn {
            width: 100%;
            margin-top: 24px;
            padding: 13px;
            border: 2px solid var(--accent);
            border-radius: 10px;
            background: transparent;
            color: var(--accent);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s, color 0.18s;
        }
        .replay-full-btn:hover { background: var(--accent); color: white; }

        /* ── Loading ──────────────────────────────────────── */
        .loading-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
        }
        .spinner {
            width: 44px; height: 44px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Modal override (supplement gamification.css) ─── */
        .modal.hidden   { display: none !important; }
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════════
//  Inline helpers — extracted from app.js, no BLE/DOM dependencies
// ═══════════════════════════════════════════════════════════════════

function parseCSVData(csvText) {
    if (!csvText) return [];
    const lines = csvText.trim().split('\n');
    const data = [];
    let timeOffset = 0, previousElapsed = 0, sequenceCount = 0;
    for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const parts = line.split(',');
        if (parts.length >= 5) {
            try {
                const elapsed_ms = parseInt(parts[0]);
                if (i > 1 && elapsed_ms < previousElapsed) {
                    timeOffset += previousElapsed;
                    sequenceCount++;
                }
                data.push({
                    elapsed_ms,
                    adjusted_elapsed_ms: elapsed_ms + timeOffset,
                    timestamp:  parts[1],
                    angle:      parseFloat(parts[2]),
                    feedback:   parseInt(parts[3]),
                    zone:       parts[4].trim(),
                    sequence:   sequenceCount
                });
                previousElapsed = elapsed_ms;
            } catch (_e) {}
        }
    }
    return data;
}

function calculateStatistics(data, metadata) {
    const yellowThreshold = parseFloat(metadata.threshold_yellow) || 30;
    const redThreshold    = parseFloat(metadata.threshold_red)    || 60;
    // totalYellowTime intentionally includes both yellow and red exposure.
    let totalGreenTime = 0, totalYellowTime = 0, totalRedTime = 0;
    let recoveryEvents = [], currentBadZoneStart = null, currentBadZone = null;
    let greenStreaks = [], currentGreenStreak = 0;

    for (let i = 0; i < data.length; i++) {
        const point    = data[i];
        const prevPoint = i > 0 ? data[i - 1] : null;
        const timeStep = prevPoint
            ? (point.adjusted_elapsed_ms - prevPoint.adjusted_elapsed_ms) / 1000
            : 0;

        if (point.zone === 'green') {
            totalGreenTime += timeStep;
            currentGreenStreak += timeStep;
            if (prevPoint && (prevPoint.zone === 'yellow' || prevPoint.zone === 'red') && currentBadZoneStart !== null) {
                recoveryEvents.push({
                    fromZone: currentBadZone,
                    recoveryTime: (point.adjusted_elapsed_ms - currentBadZoneStart) / 1000
                });
                currentBadZoneStart = null; currentBadZone = null;
            }
        } else {
            if (currentGreenStreak > 0) { greenStreaks.push(currentGreenStreak); currentGreenStreak = 0; }
            if (point.zone === 'yellow') {
                totalYellowTime += timeStep;
                if (prevPoint && prevPoint.zone === 'green') { currentBadZoneStart = point.adjusted_elapsed_ms; currentBadZone = 'yellow'; }
            } else if (point.zone === 'red') {
                totalYellowTime += timeStep;
                totalRedTime += timeStep;
                if (prevPoint && prevPoint.zone === 'green') { currentBadZoneStart = point.adjusted_elapsed_ms; currentBadZone = 'red'; }
                else if (currentBadZone === 'yellow') { currentBadZone = 'red'; }
            }
        }
    }
    if (currentGreenStreak > 0) greenStreaks.push(currentGreenStreak);

    const totalTime  = (data[data.length - 1].adjusted_elapsed_ms - data[0].adjusted_elapsed_ms) / 1000;
    const halfIdx    = Math.floor(data.length / 2);
    const avgFirst   = data.slice(0, halfIdx).reduce((s, d) => s + d.angle, 0) / halfIdx;
    const avgSecond  = data.slice(halfIdx).reduce((s, d) => s + d.angle, 0) / (data.length - halfIdx);
    const fastestRec = recoveryEvents.length > 0 ? Math.min(...recoveryEvents.map(e => e.recoveryTime)) : null;

    return {
        totalTime, totalGreenTime, totalYellowTime, totalRedTime,
        greenPercentage:  (totalGreenTime  / totalTime * 100).toFixed(1),
        yellowPercentage: (totalYellowTime / totalTime * 100).toFixed(1),
        redPercentage:    (totalRedTime    / totalTime * 100).toFixed(1),
        averageAngle:     (data.reduce((s, d) => s + d.angle, 0) / data.length).toFixed(2),
        recoveryCount:    recoveryEvents.length,
        fastestRecovery:  fastestRec ? fastestRec.toFixed(1) : 'N/A',
        greenStreaks,
        longestGreenStreak: greenStreaks.length > 0 ? Math.max(...greenStreaks).toFixed(1) : 0,
        avgFirst:   avgFirst.toFixed(2),
        avgSecond:  avgSecond.toFixed(2),
        improvement: avgFirst > avgSecond
    };
}

// ═══════════════════════════════════════════════════════════════════
//  Demo-specific rendering helpers
// ═══════════════════════════════════════════════════════════════════

/** Session registry — keyed by sessionKey, holds data + deviceType */
const _sessions = {};
const _recordReplayTracks = {};

function zoneLevel(zone) {
    if (zone === 'red') return 2;
    if (zone === 'yellow') return 1;
    return 0;
}

function zoneFromLevel(level) {
    if (level >= 2) return 'red';
    if (level >= 1) return 'yellow';
    return 'green';
}

function buildCombinedReplayTrack(armData, trunkData) {
    const arm = Array.isArray(armData) ? armData : [];
    const trunk = Array.isArray(trunkData) ? trunkData : [];

    const msSet = new Set();
    arm.forEach(p => msSet.add(p.adjusted_elapsed_ms));
    trunk.forEach(p => msSet.add(p.adjusted_elapsed_ms));
    const timeline = [...msSet].sort((a, b) => a - b);

    function nearestPoint(points, ms) {
        if (!points || points.length === 0) return null;
        let lo = 0;
        let hi = points.length - 1;

        while (lo <= hi) {
            const mid = (lo + hi) >> 1;
            const v = points[mid].adjusted_elapsed_ms;
            if (v === ms) return points[mid];
            if (v < ms) lo = mid + 1;
            else hi = mid - 1;
        }

        const left = hi >= 0 ? points[hi] : null;
        const right = lo < points.length ? points[lo] : null;
        if (!left) return right;
        if (!right) return left;

        const dl = Math.abs(left.adjusted_elapsed_ms - ms);
        const dr = Math.abs(right.adjusted_elapsed_ms - ms);
        return dl <= dr ? left : right;
    }

    return timeline.map(ms => {
        const a = nearestPoint(arm, ms);
        const t = nearestPoint(trunk, ms);
        const armAngle = a ? (a.angle || 0) : 0;
        const trunkAngle = t ? (t.angle || 0) : 0;
        const armZone = a ? (a.zone || 'green') : 'green';
        const trunkZone = t ? (t.zone || 'green') : 'green';
        const mergedZone = zoneFromLevel(Math.max(zoneLevel(armZone), zoneLevel(trunkZone)));

        return {
            adjusted_elapsed_ms: ms,
            elapsed_ms: ms,
            timestamp: t ? t.timestamp : (a ? a.timestamp : '00:00:00.000'),
            trunkAngle,
            armAngle,
            trunkZone,
            armZone,
            angle: trunkAngle,
            zone: mergedZone,
            feedback: (a && a.feedback) || (t && t.feedback) || 0
        };
    });
}

function calculateCombinedVennStats(track) {
    if (!Array.isArray(track) || track.length < 2) {
        return {
            bothGreenPct: 0,
            anyYellowPct: 0,
            anyRedPct: 0,
            bothRedPct: 0,
            bothGreenSec: 0,
            anyYellowSec: 0,
            anyRedSec: 0,
            bothRedSec: 0,
            totalSec: 0
        };
    }

    let bothGreenSec = 0;
    let anyYellowSec = 0;
    let anyRedSec = 0;
    let bothRedSec = 0;

    for (let i = 1; i < track.length; i++) {
        const curr = track[i];
        const prev = track[i - 1];
        const dt = Math.max(0, (curr.adjusted_elapsed_ms - prev.adjusted_elapsed_ms) / 1000);
        if (dt <= 0) continue;

        const armZone = curr.armZone || 'green';
        const trunkZone = curr.trunkZone || 'green';

        const isBothGreen = armZone === 'green' && trunkZone === 'green';
        const isAnyYellow = armZone === 'yellow' || trunkZone === 'yellow';
        const isAnyRed = armZone === 'red' || trunkZone === 'red';
        const isBothRed = armZone === 'red' && trunkZone === 'red';

        if (isBothGreen) bothGreenSec += dt;
        if (isAnyYellow) anyYellowSec += dt;
        if (isAnyRed) anyRedSec += dt;
        if (isBothRed) bothRedSec += dt;
    }

    const totalSec = Math.max(0.0001, (track[track.length - 1].adjusted_elapsed_ms - track[0].adjusted_elapsed_ms) / 1000);

    return {
        bothGreenPct: (bothGreenSec / totalSec) * 100,
        anyYellowPct: (anyYellowSec / totalSec) * 100,
        anyRedPct: (anyRedSec / totalSec) * 100,
        bothRedPct: (bothRedSec / totalSec) * 100,
        bothGreenSec,
        anyYellowSec,
        anyRedSec,
        bothRedSec,
        totalSec
    };
}

/**
 * After renderAvatarGrid() creates .avatar-jump-btn elements, their
 * onclick reads window._gamCurrentData. Re-bind them here so each
 * button loads the correct session's data before opening the modal.
 */
function _bindReplayButtons(containerId, recordKey) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.querySelectorAll('.avatar-jump-btn').forEach(btn => {
        // Extract the ms argument from the existing onclick string
        const match = (btn.getAttribute('onclick') || '').match(/[\d.]+/);
        const ms = match ? parseFloat(match[0]) : 0;
        btn.removeAttribute('onclick');
        btn.addEventListener('click', () => {
            const track = _recordReplayTracks[recordKey] || [];
            window._gamCurrentData       = track;
            window._gamCurrentDeviceType = 'combined';
            showAvatarReplayModal(track, 'combined');
            requestAnimationFrame(() => AvatarReplay.seekToMs(ms));
        });
    });
}

/** Open the full-session replay for a given recordKey */
function openRecordReplay(recordKey) {
    const track = _recordReplayTracks[recordKey] || [];
    window._gamCurrentData       = track;
    window._gamCurrentDeviceType = 'combined';
    showAvatarReplayModal(track, 'combined');
}

function openFullReplay(sessionKey) {
    const s = _sessions[sessionKey];
    window._gamCurrentData       = s.data;
    window._gamCurrentDeviceType = s.deviceType;
    showAvatarReplayModal(s.data, s.deviceType);
}

function renderSessionCard(sessionKey, label, filename, summary) {
    const rl      = GAM.RISK_LEVELS[summary.riskLevel] || GAM.RISK_LEVELS.moderate;
    const dur     = Math.round(summary.sessionDuration);
    const impText = summary.improvement ? '📈 Improving' : '📉 Declining';

    return `
    <div class="session-card">
        <div class="session-card-header">
            <h2>${label}</h2>
            <span class="file-badge">${filename}</span>
        </div>
        <div class="session-card-body">

            <div class="stats-grid">
                <div class="stat-cell">
                    <div class="stat-val c-red">${summary.redPct}%</div>
                    <div class="stat-label">Red</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-val c-yellow">${summary.yellowPct}%</div>
                    <div class="stat-label">Yellow+Red</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-val c-green">${summary.greenPct}%</div>
                    <div class="stat-label">Green</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-val">${dur}s</div>
                    <div class="stat-label">Duration</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-val">${summary.vibrationCount}</div>
                    <div class="stat-label">Alerts</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-val c-muted">${impText}</div>
                    <div class="stat-label">Trend</div>
                </div>
            </div>

            <div class="rula-badge" style="background:${rl.bg};color:${rl.color};">
                <span class="rula-icon">⚡</span>
                <span>RULA Score: <strong>${summary.rulaScore.toFixed(2)}</strong> &nbsp;·&nbsp; ${rl.label}</span>
            </div>

            <div class="section-title">Posture Snapshots &amp; Feedback</div>
            <div id="anthro-${sessionKey}"></div>

            <button class="replay-full-btn" onclick="openFullReplay('${sessionKey}')">
                ▶&nbsp;&nbsp;Play Full Session Replay
            </button>
        </div>
    </div>`;
}

function wireAvatarModal() {
    const modal         = document.getElementById('avatarReplayModal');
    const closeBtn      = document.getElementById('avatarReplayModalClose');
    const closeFooter   = document.getElementById('avatarReplayCloseFooterBtn');
    const playPauseBtn  = document.getElementById('avatarPlayPauseBtn');
    const timeline      = document.getElementById('avatarTimeline');

    const closeModal = () => {
        AvatarReplay.pause();
        modal.classList.add('hidden');
        playPauseBtn.textContent = '▶';
    };

    closeBtn.onclick = closeFooter.onclick = closeModal;
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    playPauseBtn.onclick = function () {
        if (AvatarReplay.isPlaying) {
            AvatarReplay.pause();
            this.textContent = '▶';
        } else {
            AvatarReplay.play();
            this.textContent = '⏸';
        }
    };

    timeline.oninput = function () {
        AvatarReplay.pause();
        playPauseBtn.textContent = '▶';
        AvatarReplay.seekTo(parseInt(this.value));
    };

    document.querySelectorAll('.avatar-speed-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            AvatarReplay.speed = parseFloat(this.dataset.speed);
            document.querySelectorAll('.avatar-speed-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
        });
    });

    document.querySelectorAll('.avatar-view-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            window._avatarViewMode = (this.dataset.view || 'front').toLowerCase() === 'side' ? 'side' : 'front';
            if (typeof AvatarReplay !== 'undefined') {
                AvatarReplay.viewMode = window._avatarViewMode;
                AvatarReplay._drawFigure(document.getElementById('avatarStage'));
            }
            document.querySelectorAll('.avatar-view-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
        });
    });
}

let DEMO_FILE_OPTIONS = [];

const SLOT_META = {
    arm:   { device_type: 'arm', threshold_yellow: '30', threshold_red: '60' },
    trunk: { device_type: 'trunk', threshold_yellow: '30', threshold_red: '60' }
};

async function loadDemoFileOptions() {
    const fallback = Array.isArray(APP_CONFIG?.demoDataFiles) ? APP_CONFIG.demoDataFiles.slice() : [];

    try {
        const resp = await fetch('demo-data/');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const html = await resp.text();
        const regex = /href="([^"]+\.csv)"/ig;
        const names = [];
        let m;
        while ((m = regex.exec(html)) !== null) {
            const raw = m[1] || '';
            const name = decodeURIComponent(raw.split('/').pop());
            if (name && !names.includes(name)) names.push(name);
        }
        const finalNames = names.length > 0 ? names : fallback;
        DEMO_FILE_OPTIONS = finalNames
            .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }))
            .map(name => ({ value: name, label: name, path: `demo-data/${encodeURIComponent(name)}` }));
    } catch (_err) {
        DEMO_FILE_OPTIONS = fallback
            .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }))
            .map(name => ({ value: name, label: name, path: `demo-data/${encodeURIComponent(name)}` }));
    }
}

function assignDefaultRecordSlots() {
    const names = DEMO_FILE_OPTIONS.map(f => f.value);
    if (names.length === 0) return;

    const arm = names.filter(n => /arm/i.test(n));
    const trunk = names.filter(n => /trunk/i.test(n));

    if (arm.length > 0 && trunk.length > 0) {
        RECORD_SLOTS.recordA.arm = arm[0];
        RECORD_SLOTS.recordA.trunk = trunk[0];
        RECORD_SLOTS.recordB.arm = arm[1] || arm[0];
        RECORD_SLOTS.recordB.trunk = trunk[1] || trunk[0];
        return;
    }

    RECORD_SLOTS.recordA.arm = names[0];
    RECORD_SLOTS.recordA.trunk = names[1] || names[0];
    RECORD_SLOTS.recordB.arm = names[2] || names[0];
    RECORD_SLOTS.recordB.trunk = names[3] || names[1] || names[0];
}

function combinedRiskLevelFromTotalScore(totalScore) {
    if (totalScore === 1 || totalScore === 2) return 'low';
    if (totalScore === 3 || totalScore === 4) return 'mild';
    if (totalScore === 5 || totalScore === 6) return 'moderate';
    return 'high';
}

function getCombinedRiskPresentation(totalScore) {
    const level = combinedRiskLevelFromTotalScore(totalScore);
    if (level === 'low') {
        return { level, label: 'Low Risk (Acceptable)', color: '#2e7d32', bg: '#e8f5e9' };
    }
    if (level === 'mild') {
        return { level, label: 'Mild Risk (Observe)', color: '#8d6e00', bg: '#fff8e1' };
    }
    if (level === 'moderate') {
        return { level, label: 'Moderate Risk (Improve Soon)', color: '#e65100', bg: '#fff3e0' };
    }
    return { level, label: 'High Risk (Improve Now)', color: '#b71c1c', bg: '#ffebee' };
}

async function buildRecord(recordKey, recordLabel, armFile, trunkFile) {
    const armOpt = DEMO_FILE_OPTIONS.find(f => f.value === armFile);
    const trunkOpt = DEMO_FILE_OPTIONS.find(f => f.value === trunkFile);
    if (!armOpt || !trunkOpt) throw new Error('Invalid demo slot file');

    const [armText, trunkText] = await Promise.all([
        fetch(armOpt.path).then(r => { if (!r.ok) throw new Error(`Cannot fetch ${armOpt.path} (${r.status})`); return r.text(); }),
        fetch(trunkOpt.path).then(r => { if (!r.ok) throw new Error(`Cannot fetch ${trunkOpt.path} (${r.status})`); return r.text(); })
    ]);

    const armData = parseCSVData(armText);
    const trunkData = parseCSVData(trunkText);
    const armStats = calculateStatistics(armData, SLOT_META.arm);
    const trunkStats = calculateStatistics(trunkData, SLOT_META.trunk);

    const armSummary = buildSessionSummary(armData, SLOT_META.arm, armStats, armFile);
    const trunkSummary = buildSessionSummary(trunkData, SLOT_META.trunk, trunkStats, trunkFile);
    const combinedSummary = buildCombinedSessionSummary(
        { data: armData, metadata: SLOT_META.arm, stats: armStats, filename: armFile },
        { data: trunkData, metadata: SLOT_META.trunk, stats: trunkStats, filename: trunkFile },
        `${recordLabel}: ${armFile} + ${trunkFile}`
    );
    const combinedTrack = buildCombinedReplayTrack(armData, trunkData);
    combinedSummary.vennStats = calculateCombinedVennStats(combinedTrack);

    // Ensure snapshot avatars can use paired arm+trunk real measurements at each timestamp.
    armSummary.snapshotTrack = combinedTrack;
    trunkSummary.snapshotTrack = combinedTrack;

    // Combined final score is ARM + TRUNK, capped to the 1-7 scale.
    const combinedTotalScore = Math.min(7, armSummary.rulaScore + trunkSummary.rulaScore);
    combinedSummary.rulaScore = combinedTotalScore;
    combinedSummary.riskLevel = combinedRiskLevelFromTotalScore(combinedTotalScore);

    const armKey = `${recordKey}-arm`;
    const trunkKey = `${recordKey}-trunk`;
    _sessions[armKey] = { data: armData, deviceType: 'arm', summary: armSummary };
    _sessions[trunkKey] = { data: trunkData, deviceType: 'trunk', summary: trunkSummary };
    _recordReplayTracks[recordKey] = combinedTrack;

    return {
        html: renderRecordCard(recordKey, recordLabel, armFile, trunkFile, armSummary, trunkSummary, combinedSummary),
        parts: [
            { key: armKey, summary: armSummary },
            { key: trunkKey, summary: trunkSummary }
        ]
    };
}

async function buildTwoRecords() {
    _sessions.recordA = undefined;
    _sessions.recordB = undefined;

    const [recordA, recordB] = await Promise.all([
        buildRecord('recordA', 'Record A', RECORD_SLOTS.recordA.arm, RECORD_SLOTS.recordA.trunk),
        buildRecord('recordB', 'Record B', RECORD_SLOTS.recordB.arm, RECORD_SLOTS.recordB.trunk)
    ]);

    const container = document.getElementById('demoContainer');
    container.innerHTML = `${recordA.html}${recordB.html}`;

    [...recordA.parts, ...recordB.parts].forEach(s => {
        renderAnthropomorphicFeedback(`anthro-${s.key}`, s.summary);
        _bindReplayButtons(`anthro-${s.key}`, s.key.startsWith('recordA-') ? 'recordA' : 'recordB');
    });

    wireAvatarModal();
}

function initSlotPickers() {
    const recordAArmSelect = document.getElementById('recordAArmSelect');
    const recordATrunkSelect = document.getElementById('recordATrunkSelect');
    const recordBArmSelect = document.getElementById('recordBArmSelect');
    const recordBTrunkSelect = document.getElementById('recordBTrunkSelect');
    const applyBtn = document.getElementById('applyDemoSlotsBtn');

    const optionsHtml = DEMO_FILE_OPTIONS.map(f => `<option value="${f.value}">${f.label}</option>`).join('');
    [recordAArmSelect, recordATrunkSelect, recordBArmSelect, recordBTrunkSelect].forEach(sel => {
        sel.innerHTML = optionsHtml;
    });

    recordAArmSelect.value = RECORD_SLOTS.recordA.arm;
    recordATrunkSelect.value = RECORD_SLOTS.recordA.trunk;
    recordBArmSelect.value = RECORD_SLOTS.recordB.arm;
    recordBTrunkSelect.value = RECORD_SLOTS.recordB.trunk;

    applyBtn.addEventListener('click', async () => {
        try {
            RECORD_SLOTS.recordA.arm = recordAArmSelect.value;
            RECORD_SLOTS.recordA.trunk = recordATrunkSelect.value;
            RECORD_SLOTS.recordB.arm = recordBArmSelect.value;
            RECORD_SLOTS.recordB.trunk = recordBTrunkSelect.value;

            await buildTwoRecords();
        } catch (err) {
            document.getElementById('demoContainer').innerHTML = `<div class="loading-state" style="color:#c62828;"><p><strong>Failed to load demo slots:</strong> ${err.message}</p></div>`;
        }
    });
}

function patchCombinedAvatarReplay() {
    if (!window.AvatarReplay || window.AvatarReplay._combinedPatchApplied) return;

    const originalRender3D = AvatarReplay._renderReplay3D.bind(AvatarReplay);
    const originalDrawFigure = AvatarReplay._drawFigure.bind(AvatarReplay);

    AvatarReplay._renderReplay3D = function(stage, angle, zone) {
        if ((this.deviceType || '').toLowerCase() !== 'combined') {
            return originalRender3D(stage, angle, zone);
        }

        const ctx = this._ensureReplay3D(stage);
        if (!ctx) return false;

        const point = (this.data && this.data[this.currentIndex]) || {};
        const trunkDeg = Math.max(0, +point.trunkAngle || 0);
        const armDeg = Math.max(0, +point.armAngle || 0);
        const trunkZone = point.trunkZone || 'green';
        const armZone = point.armZone || 'green';

        if (this.viewMode === 'side') ctx.camera.position.set(1.45, 1.18, 2.25);
        else ctx.camera.position.set(0.02, 1.18, 2.95);
        ctx.camera.lookAt(0, 0.72, 0);

        ctx.mannequin.reset();
        ctx.mannequin.setTrunkAngle(trunkDeg);
        ctx.mannequin.setArmAngle(armDeg, trunkDeg);
        ctx.mannequin.setTrunkZone(trunkZone);
        ctx.mannequin.setArmZone(armZone);
        ctx.renderer.render(ctx.scene, ctx.camera);
        return true;
    };

    AvatarReplay._drawFigure = function(stage) {
        originalDrawFigure(stage);
        if ((this.deviceType || '').toLowerCase() !== 'combined') return;

        const point = (this.data && this.data[this.currentIndex]) || {};
        const zoneColor = (point.zone === 'red') ? '#f44336' : (point.zone === 'yellow' ? '#ffc107' : '#4caf50');
        const angleDisplay = document.getElementById('avatarCurrentAngle');
        if (angleDisplay) {
            angleDisplay.innerHTML = `Trunk: <strong>${(+point.trunkAngle || 0).toFixed(1)}°</strong> · Arm: <strong>${(+point.armAngle || 0).toFixed(1)}°</strong> · Zone: <strong style="color:${zoneColor}">${(point.zone || 'green').toUpperCase()}</strong>`;
        }
    };

    AvatarReplay._combinedPatchApplied = true;
}

async function initDemo() {
    patchCombinedAvatarReplay();
    await loadDemoFileOptions();
    assignDefaultRecordSlots();
    initSlotPickers();
    await buildTwoRecords();
}
