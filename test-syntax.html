<!DOCTYPE html>
<html>
<head>
    <title>Syntax Test</title>
</head>
<body>
    <h1>JavaScript Syntax Test</h1>
    <div id="status">Loading...</div>
    <script>
        // Test loading app.js
        const script = document.createElement('script');
        script.src = 'app.js';
        script.onerror = function() {
            document.getElementById('status').innerHTML = '<span style="color:red">❌ app.js failed to load</span>';
        };
        script.onload = function() {
            document.getElementById('status').innerHTML = '<span style="color:green">✅ app.js loaded successfully</span>';
        };
        
        // Catch syntax errors
        window.addEventListener('error', function(e) {
            const errorDiv = document.createElement('div');
            errorDiv.style.color = 'red';
            errorDiv.style.border = '2px solid red';
            errorDiv.style.padding = '10px';
            errorDiv.style.marginTop = '10px';
            errorDiv.innerHTML = `
                <strong>Error:</strong> ${e.message}<br>
                <strong>File:</strong> ${e.filename}<br>
                <strong>Line:</strong> ${e.lineno}<br>
                <strong>Column:</strong> ${e.colno}
            `;
            document.body.appendChild(errorDiv);
        });
        
        document.body.appendChild(script);
    </script>
</body>
</html>
